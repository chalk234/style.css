<!DOCTYPE html>
<html lang="zh-CN">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>地图项目</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- 顶栏 -->

<header class="topbar">

<div class="logo">
地图项目
</div>

<div class="toolbar">

<input
id="projectTitle"
type="text"
placeholder="输入项目名称">

<label class="upload-btn">

上传地图

<input
id="mapUpload"
type="file"
accept=".jpg,.jpeg,.png">

</label>

<input
id="themeColor"
type="color"
value="#4F8CFF">

<button id="toggleMarkers">
显示/隐藏标记
</button>

<button id="exportProject">
导出工程
</button>

<button id="importProjectBtn">
导入工程
</button>

<input
id="importProject"
type="file"
accept=".json"
hidden>

</div>

</header>

<!-- 主区域 -->

<main id="workspace">

<div id="canvasArea">

<div id="mapContainer">

<img
id="mapImage"
src=""
alt="地图">

<div id="markerLayer"></div>

</div>

</div>

<!-- 编辑器 -->

<aside id="editorPanel">

<div class="panel-title">

标记编辑器

</div>

<div class="field">

<label>标题</label>

<input
id="markerTitle"
type="text">

</div>

<div class="field">

<label>内容</label>

<textarea
id="markerContent"></textarea>

</div>

<div class="field">

<label>颜色</label>

<input
id="markerColor"
type="color"
value="#4F8CFF">

</div>

<button id="saveMarker">

保存修改

</button>

<button id="deleteMarker">

删除标记

</button>

</aside>

</main>

<!-- 提示 -->

<div id="helpBox">

双击地图创建标记

</div>

<script src="app.js"></script>

</body>
</html>
